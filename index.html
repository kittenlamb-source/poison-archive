<script>
  const themeMap = {
    medicine: ['foxglove', 'nicotiana', 'mandrake'],
    resistance: ['peacock-flower'],
    folklore: ['datura', 'belladonna', 'henbane', 'mandrake'],
    food: ['cassava', 'ergot', 'grass-pea', 'cashew'],
    science: ['curare', 'kombe', 'foxglove', 'ergot']
  };

  const splashScreen = document.getElementById('splashScreen');
  const enterArchiveBtn = document.getElementById('enterArchiveBtn');
  const dismissNoteBtn = document.getElementById('dismissNoteBtn');
  const categoryFilter = document.getElementById('categoryFilter');
  const searchInput = document.getElementById('searchInput');
  const randomBtn = document.getElementById('randomBtn');
  const clearThemeBtn = document.getElementById('clearThemeBtn');
  const themeButtons = document.getElementById('themeButtons');
  const categoryButtons = document.getElementById('categoryButtons');
  const cardList = document.getElementById('cardList');
  const detailPanel = document.getElementById('detailPanel');
  const stats = document.getElementById('stats');

  const categories = [...new Set(archive.map(item => item.category))];
  categories.forEach(cat => {
    const option = document.createElement('option');
    option.value = cat;
    option.textContent = cat;
    categoryFilter.appendChild(option);
  });

  let selectedId = archive[0]?.id || null;
  let activeTheme = null;
  let activeGallery = null;

  function scoreText(item) {
    return [
      item.name || '',
      item.common || '',
      item.scientific || '',
      item.category || '',
      item.region || '',
      item.mechanism || '',
      item.history || '',
      item.culture || '',
      ...(item.compounds || []),
      ...(item.effects || []),
      ...(item.themes || [])
    ].join(' ').toLowerCase();
  }

  function glyphFor(item) {
    const map = {
      'Pain & Wounds': '✢',
      'Sedatives & Stimulants': '☽',
      'Psychoactives': '◈',
      'Reproductive': '❀',
      'Chronic / Systemic Conditions': '☍',
      'Poison Only': '☠',
      'Neurotoxic Plants': '⚡',
      'Cardiotoxic Plants': '♥',
      'Cytotoxic Plants': '✧',
      'Hallucinogenic / Deliriant Plants': '☾',
      'Food & Crop Toxicity': '✶',
      'Poison as Resistance': '❖'
    };
    return map[item.category] || '✦';
  }

  function codeFor(item) {
    return (item.id || 'SPECIMEN')
      .replace(/[^a-z]/gi, '')
      .slice(0, 6)
      .toUpperCase();
  }

  function imageMarkup(item) {
    if (!item.image) return '';
    const alt = `${item.name} specimen image`;
    return `<img src="${item.image}" alt="${alt}">`;
  }

  function getFiltered() {
    const term = searchInput.value.trim().toLowerCase();
    const cat = categoryFilter.value;

    return archive.filter(item => {
      const matchesCat = cat === 'all' || item.category === cat;
      const matchesTerm = !term || scoreText(item).includes(term);
      const matchesTheme = !activeTheme || (themeMap[activeTheme] || []).includes(item.id);
      const matchesGallery = !activeGallery || item.category === activeGallery;
      return matchesCat && matchesTerm && matchesTheme && matchesGallery;
    });
  }

  function renderStats(items) {
    const categoryCounts = items.reduce((acc, item) => {
      acc[item.category] = (acc[item.category] || 0) + 1;
      return acc;
    }, {});

    const chips = [`<span class="chip">${items.length} records shown</span>`];

    Object.entries(categoryCounts).forEach(([cat, count]) => {
      chips.push(`<span class="chip">${cat}: ${count}</span>`);
    });

    if (activeTheme) {
      chips.push(`<span class="chip">Theme filter: ${activeTheme}</span>`);
    }

    if (activeGallery) {
      chips.push(`<span class="chip">Gallery: ${activeGallery}</span>`);
    }

    stats.innerHTML = chips.join('');
  }

  function renderDetail(item) {
    if (!item) {
      detailPanel.innerHTML = `
        <div class="empty">
          Select a record to view the full archive entry.
        </div>
      `;
      return;
    }

    detailPanel.innerHTML = `
      <div class="detail-header">
        <div>
          <h2>${item.name}</h2>
          <div class="latin">${item.scientific || ''}</div>
        </div>

        <div class="specimen-plate" aria-label="Specimen plate">
          <div class="specimen-label">Archive specimen</div>
          ${item.image
            ? imageMarkup(item)
            : `<div class="specimen-glyph-large">${glyphFor(item)}</div>`
          }
          <div class="specimen-caption">
            ${item.common || ''}<br>${item.region || ''}
          </div>
          ${item.credit
            ? `<div class="specimen-credit">Image: ${item.credit}</div>`
            : ''
          }
        </div>
      </div>

      <div class="meta">
        <span class="chip">Common name(s): ${item.common || '—'}</span>
        <span class="chip">Region: ${item.region || '—'}</span>
        <span class="chip">Specimen code: ${codeFor(item)}</span>
      </div>

      <section class="section">
        <h3>Active Compounds</h3>
        <ul>
          ${(item.compounds || []).map(c => `<li>${c}</li>`).join('')}
        </ul>
      </section>

      <section class="section">
        <h3>Mechanism</h3>
        <p>${item.mechanism || '—'}</p>
      </section>

      <section class="section">
        <h3>Effects on the Body</h3>
        <ul>
          ${(item.effects || []).map(e => `<li>${e}</li>`).join('')}
        </ul>
      </section>

      <section class="section">
        <h3>Archive Notes</h3>
        <div class="record-grid">
          <div class="record">
            <strong>Historical Case / Reference</strong>
            <span>${item.history || '—'}</span>
          </div>
          <div class="record">
            <strong>Cultural / Ethnobotanical Notes</strong>
            <span>${item.culture || '—'}</span>
          </div>
        </div>
      </section>

      <section class="section">
        <h3>Themes</h3>
        <div class="meta">
          ${(item.themes || []).map(t => `<span class="chip">${t}</span>`).join('')}
        </div>
      </section>
    `;
  }

  function renderList(items) {
    if (!items.length) {
      cardList.innerHTML = `
        <div class="empty">
          No records match that search. Try a different toxin, place, theme, or category.
        </div>
      `;
      detailPanel.innerHTML = `
        <div class="empty">
          Select a record to view the full archive entry.
        </div>
      `;
      return;
    }

    if (!items.some(item => item.id === selectedId)) {
      selectedId = items[0].id;
    }

    cardList.innerHTML = items.map(item => `
      <button class="entry ${item.id === selectedId ? 'active' : ''}" data-id="${item.id}">
        <div class="specimen-thumb" aria-hidden="true">
          ${item.image
            ? imageMarkup(item)
            : `<div class="specimen-glyph">${glyphFor(item)}</div>`
          }
          <div class="specimen-code">${codeFor(item)}</div>
        </div>

        <div class="entry-main">
          <div class="entry-top">
            <div>
              <h3>${item.name}</h3>
              <div class="latin">${item.scientific || ''}</div>
            </div>
            <span class="tag">${item.category}</span>
          </div>

          <p><strong>Region:</strong> ${item.region || '—'}</p>
          <p><strong>Compounds:</strong> ${(item.compounds || []).join('; ')}</p>
        </div>
      </button>
    `).join('');

    [...cardList.querySelectorAll('.entry')].forEach(btn => {
      btn.addEventListener('click', () => {
        selectedId = btn.dataset.id;
        render();
      });
    });

    const currentItem = items.find(item => item.id === selectedId);
    renderDetail(currentItem);
  }

  function render() {
    const items = getFiltered();
    renderStats(items);
    renderList(items);
  }

  if (enterArchiveBtn) {
    enterArchiveBtn.addEventListener('click', () => {
      splashScreen.classList.add('hidden');
    });
  }

  if (dismissNoteBtn) {
    dismissNoteBtn.addEventListener('click', () => {
      splashScreen.classList.add('hidden');
    });
  }

  if (searchInput) {
    searchInput.addEventListener('input', () => {
      activeTheme = null;
      activeGallery = null;
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      render();
    });
  }

  if (categoryFilter) {
    categoryFilter.addEventListener('change', () => {
      activeTheme = null;
      activeGallery = null;
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      render();
    });
  }

  if (randomBtn) {
    randomBtn.addEventListener('click', () => {
      const items = getFiltered();
      if (!items.length) return;
      const pick = items[Math.floor(Math.random() * items.length)];
      selectedId = pick.id;
      render();
    });
  }

  if (clearThemeBtn) {
    clearThemeBtn.addEventListener('click', () => {
      activeTheme = null;
      activeGallery = null;
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
      searchInput.value = '';
      categoryFilter.value = 'all';
      render();
    });
  }

  if (themeButtons) {
    themeButtons.addEventListener('click', (event) => {
      const btn = event.target.closest('.theme-btn');
      if (!btn) return;

      document.querySelectorAll('#themeButtons .theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      activeTheme = btn.dataset.theme;
      activeGallery = null;

      document.querySelectorAll('#categoryButtons .theme-btn').forEach(b => b.classList.remove('active'));

      categoryFilter.value = 'all';
      searchInput.value = '';

      const ids = themeMap[activeTheme] || [];
      const found = archive.find(item => ids.includes(item.id));
      if (found) {
        selectedId = found.id;
      }

      render();
    });
  }

  if (categoryButtons) {
    categoryButtons.addEventListener('click', (event) => {
      const btn = event.target.closest('.category-btn');
      if (!btn) return;

      document.querySelectorAll('#categoryButtons .theme-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      activeGallery = btn.dataset.category;
      activeTheme = null;

      document.querySelectorAll('#themeButtons .theme-btn').forEach(b => b.classList.remove('active'));

      categoryFilter.value = 'all';
      searchInput.value = '';

      const found = archive.find(item => item.category === activeGallery);
      if (found) {
        selectedId = found.id;
      }

      render();
    });
  }

  render();
</script>
